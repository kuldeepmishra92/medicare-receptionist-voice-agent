# Alembic Configuration File

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# SQLite (development)
sqlalchemy.url = sqlite:///./voice_agent.db
# PostgreSQL (production) — uncomment below and comment out sqlite line above:
# sqlalchemy.url = postgresql://postgres:password@localhost:5432/voice_agent_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
